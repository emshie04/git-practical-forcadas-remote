<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="">
        <p>Hello World!</p>
        <div>
            <label for="username">Username</label>
            <input type="text" required id="input-user">
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" required id="input-pass">
        </div>
    </form>
    <p id="parag1">This is my practical examination</p>
    <button id="btn1">Alert me</button>
    <button id="btn2">Change Color</button>
</body>
<script>
        let p = document.getElementById("parag1");
        const b1 = document.querySelector("#btn1");
        const b2 = document.querySelector("#btn2");
        
        b1.addEventListener('click', function(){
            alert('Welcome to IT10');
        })
        b2.addEventListener('dblclick', function(){
            p.style.color += "red";
        })
    </script>
</html>
